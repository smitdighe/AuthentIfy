services:
  - type: web
    name: authentify-backend
    runtime: python
    runtimeVersion: 3.11.7
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --workers 4 --worker-class sync --bind 0.0.0.0:$PORT backend.wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
    disk:
      name: authentify-data
      mountPath: /var/data
      sizeGB: 1
